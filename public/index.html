<html>
<head>
    <title>Real-time Chat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
        #form { display: flex; gap: 10px; }
        #input { flex: 1; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h1>Chat App</h1>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" autocomplete="off" />
        <button>Send</button>
    </form>
    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });
        socket.on('chat message', (msg) => {
            const item = document.createElement('li');
            item.textContent = msg;
            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
        });

            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> ထွက်မယ် (Logout)</button>
        </div>
        <div id="drawingModal" class="drawing-modal"><div class="drawing-card"><h3>ပုံဆွဲခန်း <button id="closeDrawModal" style="float:right; background:#ccc; color:#000; border:none; border-radius:50%; width:30px; height:30px;">✖</button></h3><canvas id="drawCanvas" width="500" height="500"></canvas><div class="draw-tools"><button id="pencilBtn" class="small-btn active">✏️ ခဲတံ</button><button id="eraserBtn" class="small-btn">🧽 ခဲဖျက်</button><input type="color" id="colorPicker" value="#000000" style="width:40px; height:40px; border-radius:50%; border:none;"><input type="range" id="brushSize" min="2" max="40" value="4" style="width:100px;"><button id="undoCanvas" class="small-btn">↩️ နောက်ပြန်</button><button id="clearCanvas" class="small-btn">🗑️ ရှင်း</button></div><button id="confirmDrawing" style="width:100%; margin-top:8px;">✅ ပုံကို Chat ထဲပို့မယ်</button><div class="limit-text" id="drawLimitModal" style="margin-top:8px; font-size:0.7rem;"></div></div></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ---------- Frontend Code ----------
        let socket = io();
        let currentUser = null;
        let users = [];
        let messages = [];
        let messageReactions = {};
        let replyingTo = null;
        let drawingHistory = [];
        let ctx, canvas;

        // Helper functions
        function getTodayStr() { return new Date().toISOString().slice(0,10); }

        // Icon definitions
        const iconDefinitions = {
            basic: { name: "အခြေခံ", price: 23, styleClass: "icon-basic", iconHtml: '<i class="fas fa-comment"></i>', description: "စကားပြောပူဖောင်း" },
            premium: { name: "ထူးစန်း", price: 33, styleClass: "icon-premium", iconHtml: '<i class="fas fa-star"></i>', description: "ရွှေရောင်တောက် ကြယ်" },
            legendary: { name: "အလွန်လှ", price: 40, styleClass: "icon-legendary", iconHtml: '<i class="fas fa-gem"></i>', description: "စိန်တလုံး အရောင်လှိုင်း" },
            mythic: { name: "မီးတောက်", price: 100, styleClass: "icon-mythic", iconHtml: '<i class="fas fa-fire"></i>', description: "မီးတောက်လှုပ်စိ" }
        };

        // Load users from backend
        async function loadUsers() {
            const res = await fetch('/api/users');
            users = await res.json();
        }

        async function saveUser(user) {
            await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });
        }

        // Login / Register
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const confirm = document.getElementById('loginConfirm').value;
            if (!username || !password) { document.getElementById('loginError').innerText = "အမည်နှင့် စကားဝှက် ဖြည့်ပါ။"; return; }
            if (password !== confirm) { document.getElementById('loginError').innerText = "စကားဝှက် နှစ်ခုမတူပါ။"; return; }
            await loadUsers();
            let user = users.find(u => u.name === username);
            if (user) {
                if (user.password !== password) { document.getElementById('loginError').innerText = "စကားဝှက် မှားနေပါသည်။"; return; }
            } else {
                const isAdmin = (username === "htetwaiphyo");
                user = {
                    id: Date.now().toString(),
                    name: username,
                    avatar: "👤",
                    points: 50,
                    vipTier: "none",
                    dailyDrawCount: 0,
                    lastDrawDate: getTodayStr(),
                    totalMessages: 0,
                    isAdmin: isAdmin,
                    ownedIcons: ["basic"],
                    equippedIcon: "basic",
                    password: password,
                    profilePic: null
                };
                users.push(user);
                await saveUser(user);
            }
            if (username === "htetwaiphyo" && !user.isAdmin) user.isAdmin = true;
            if (username !== "htetwaiphyo" && user.isAdmin) user.isAdmin = false;
            await saveUser(user);
            currentUser = user;
            localStorage.setItem("currentUserId", currentUser.id);
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            initCanvas();
            renderChat();
            updateProfileUI();
            renderIconShop();
            // Start periodic refresh
            setInterval(() => { renderChat(); updateProfileUI(); }, 2000);
        }

        // Drawing canvas
        function initCanvas() {
            canvas = document.getElementById('drawCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = 500; canvas.height = 500;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0,0,500,500);
            saveCanvasState();
            let drawing = false, currentTool = 'pencil', currentColor = '#000000', brushWidth = 4;
            function saveCanvasState() { drawingHistory.push(canvas.toDataURL()); if(drawingHistory.length>20) drawingHistory.shift(); }
            function restoreState() { if(drawingHistory.length>1) { drawingHistory.pop(); let prev=drawingHistory[drawingHistory.length-1]; let img=new Image(); img.onload=()=>{ ctx.clearRect(0,0,500,500); ctx.drawImage(img,0,0); }; img.src=prev; } else { ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,500,500); saveCanvasState(); } }
            function getPos(e) {
                let rect = canvas.getBoundingClientRect();
                let scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
                let clientX, clientY;
                if(e.touches) { clientX=e.touches[0].clientX; clientY=e.touches[0].clientY; } else { clientX=e.clientX; clientY=e.clientY; }
                let x = (clientX - rect.left)*scaleX, y = (clientY - rect.top)*scaleY;
                return {x:Math.min(Math.max(0,x),500), y:Math.min(Math.max(0,y),500)};
            }
            function start(e) { drawing=true; let p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x,p.y); ctx.stroke(); }
            function draw(e) { if(!drawing) return; let p=getPos(e); ctx.lineWidth=brushWidth; ctx.lineCap='round'; if(currentTool==='pencil') ctx.strokeStyle=currentColor; else ctx.strokeStyle='#FFFFFF'; ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
            function end() { drawing=false; ctx.beginPath(); saveCanvasState(); }
            canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',draw); canvas.addEventListener('mouseup',end);
            canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',draw); canvas.addEventListener('touchend',end);
            document.getElementById('pencilBtn').onclick=()=>{ currentTool='pencil'; document.getElementById('pencilBtn').classList.add('active'); document.getElementById('eraserBtn').classList.remove('active'); };
            document.getElementById('eraserBtn').onclick=()=>{ currentTool='eraser'; document.getElementById('eraserBtn').classList.add('active'); document.getElementById('pencilBtn').classList.remove('active'); };
            document.getElementById('colorPicker').onchange=(e)=>currentColor=e.target.value;
            document.getElementById('brushSize').onchange=(e)=>brushWidth=parseInt(e.target.value);
            document.getElementById('clearCanvas').onclick=()=>{ ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,500,500); saveCanvasState(); };
            document.getElementById('undoCanvas').onclick=()=>restoreState();
            window.resetCanvasFresh = () => { ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,500,500); saveCanvasState(); };
        }

        async function submitDrawing() {
            if (!currentUser) return;
            let limit = currentUser.isAdmin ? 999 : (currentUser.vipTier === "vip+" ? 5 : (currentUser.vipTier === "vip" ? 3 : 2));
            if (currentUser.dailyDrawCount >= limit) { alert("ဒီနေ့ပုံဆွဲခွင့် ကျော်လွန်ပြီ။"); return; }
            const imgData = canvas.toDataURL();
            socket.emit('drawing', { senderId: currentUser.id, imageData: imgData, timestamp: Date.now() });
            currentUser.dailyDrawCount++;
            await saveUser(currentUser);
            updateProfileUI();
            closeDrawingModal();
        }

        // Socket events
        socket.on('chat message', (msg) => {
            messages.unshift(msg);
            renderChat();
        });
        socket.on('drawing', (drawing) => {
            messages.unshift(drawing);
            renderChat();
        });
        socket.on('rating', (rating) => {
            // update message rating
            renderChat();
        });
        socket.on('reaction', (reaction) => {
            renderChat();
        });

        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text) return;
            let finalText = replyingTo ? `@${replyingTo} ${text}` : text;
            socket.emit('chat message', { senderId: currentUser.id, text: finalText, timestamp: Date.now() });
            replyingTo = null;
            document.getElementById('replyBar').style.display = 'none';
            input.value = '';
            scrollToBottom();
        }

        function scrollToBottom() {
            const msgsDiv = document.getElementById('messagesArea');
            if(msgsDiv) msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }

        function renderChat() {
            // Simple rendering for demo; full features would require more code
            const container = document.getElementById('messagesArea');
            container.innerHTML = messages.map(msg => {
                let sender = users.find(u => u.id === msg.senderId);
                let senderName = sender ? sender.name : "Unknown";
                let content = msg.text || (msg.imageData ? "📷 Drawing" : "");
                return `<div class="message"><div class="msg-header"><div class="msg-left"><div class="profile-pic">👤</div><strong class="msg-name">${senderName}</strong><small>${new Date(msg.timestamp).toLocaleTimeString()}</small></div></div><div class="msg-content">${content}</div></div>`;
            }).join('');
            scrollToBottom();
        }

        function updateProfileUI() {
            if (!currentUser) return;
            document.getElementById('profileNameSide').innerText = currentUser.name;
            document.getElementById('profilePointsSide').innerHTML = `⚡ ${currentUser.points} အမှတ်`;
            document.getElementById('vipStatusText').innerText = currentUser.vipTier === 'vip' ? "VIP" : (currentUser.vipTier === 'vip+' ? "VIP+" : "Free");
            document.getElementById('dailyDrawUsed').innerText = currentUser.dailyDrawCount;
            let max = currentUser.isAdmin ? 999 : (currentUser.vipTier === "vip+" ? 5 : (currentUser.vipTier === "vip" ? 3 : 2));
            document.getElementById('dailyDrawMax').innerText = max;
            document.getElementById('adminBadge').innerText = currentUser.isAdmin ? "✅ Admin" : "❌";
            let curIcon = iconDefinitions[currentUser.equippedIcon];
            if(curIcon) document.getElementById('currentIconPreview').innerHTML = `<div class="mini-icon ${curIcon.styleClass}">${curIcon.iconHtml}</div> ${curIcon.name}`;
            if(currentUser.profilePic) document.getElementById('profileAvatarImg').src = currentUser.profilePic;
        }

        function renderIconShop() {
            let container = document.getElementById('iconShopList');
            if (!container) return;
            let html = '';
            for (let [id, def] of Object.entries(iconDefinitions)) {
                let owned = currentUser.ownedIcons.includes(id);
                let equipped = currentUser.equippedIcon === id;
                html += `<div class="shop-icon-item"><div class="icon-preview"><div class="mini-icon ${def.styleClass}">${def.iconHtml}</div><div><strong>${def.name}</strong><br><small>${def.description}</small><br><span style="font-size:0.7rem;">💰 ${def.price} ⚡</span></div></div><div>${!owned ? `<button class="small-btn" onclick="purchaseIcon('${id}')">ဝယ်မယ်</button>` : (equipped ? `<span class="equipped-badge">အသုံးပြုနေသည်</span>` : `<button class="small-btn" onclick="equipIcon('${id}')">သုံးမယ်</button>`)}</div></div>`;
            }
            container.innerHTML = html;
        }

        async function purchaseIcon(iconId) {
            let def = iconDefinitions[iconId];
            if (currentUser.points >= def.price && !currentUser.ownedIcons.includes(iconId)) {
                currentUser.points -= def.price;
                currentUser.ownedIcons.push(iconId);
                await saveUser(currentUser);
                updateProfileUI();
                renderIconShop();
                alert(`"${def.name}" အိုင်ကွန်ကို ဝယ်ယူပြီးပါပြီ။`);
            } else {
                alert("မလုံလောက်ပါ (သို့) ပိုင်ဆိုင်ပြီးသား။");
            }
        }

        async function equipIcon(iconId) {
            if (currentUser.ownedIcons.includes(iconId)) {
                currentUser.equippedIcon = iconId;
                await saveUser(currentUser);
                updateProfileUI();
                renderIconShop();
                alert(`Chat အိုင်ကွန်ကို "${iconDefinitions[iconId].name}" သို့ ပြောင်းလဲပြီးပါပြီ။`);
            } else {
                alert("ဒီအိုင်ကွန်ကို ဦးစွာဝယ်ယူပါ။");
            }
        }

        async function buyVip() {
            if (currentUser.isAdmin) { currentUser.vipTier = 'vip'; await saveUser(currentUser); updateProfileUI(); alert("Admin: VIP အခမဲ့"); return; }
            if (currentUser.points >= 150 && currentUser.vipTier !== 'vip+') {
                currentUser.points -= 150;
                currentUser.vipTier = 'vip';
                await saveUser(currentUser);
                updateProfileUI();
                alert("VIP ဝယ်ယူပြီး");
            } else alert("မလုံလောက်ပါ");
        }

        async function buyVipPlus() {
            if (currentUser.isAdmin) { currentUser.vipTier = 'vip+'; await saveUser(currentUser); updateProfileUI(); alert("Admin: VIP+ အခမဲ့"); return; }
            if (currentUser.points >= 230) {
                currentUser.points -= 230;
                currentUser.vipTier = 'vip+';
                await saveUser(currentUser);
                updateProfileUI();
                alert("VIP+ ရရှိပြီ");
            } else alert("မလုံလောက်ပါ");
        }

        function handleProfilePicChange(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                currentUser.profilePic = e.target.result;
                await saveUser(currentUser);
                updateProfileUI();
            };
            reader.readAsDataURL(file);
        }

        function openSidePanel() { document.getElementById('sidePanel').classList.add('open'); document.getElementById('panelOverlay').classList.add('active'); }
        function closeSidePanel() { document.getElementById('sidePanel').classList.remove('open'); document.getElementById('panelOverlay').classList.remove('active'); }
        function openDrawingModal() { document.getElementById('drawingModal').classList.add('active'); window.resetCanvasFresh(); }
        function closeDrawingModal() { document.getElementById('drawingModal').classList.remove('active'); }

        // Event listeners
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('sendMsgBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('openProfileBtn').onclick = openSidePanel;
        document.getElementById('closePanelBtn').onclick = closeSidePanel;
        document.getElementById('panelOverlay').onclick = closeSidePanel;
        document.getElementById('openDrawBtn').onclick = openDrawingModal;
        document.getElementById('closeDrawModal').onclick = closeDrawingModal;
        document.getElementById('confirmDrawing').onclick = submitDrawing;
        document.getElementById('buyVipBtn').onclick = buyVip;
        document.getElementById('buyVipPlusBtn').onclick = buyVipPlus;
        document.getElementById('updateNameBtn').onclick = async () => { let n = document.getElementById('editNameInput').value.trim(); if (n) { currentUser.name = n; await saveUser(currentUser); updateProfileUI(); renderChat(); } };
        document.getElementById('changePicBtn').onclick = () => document.getElementById('profilePicInput').click();
        document.getElementById('profilePicInput').onchange = (e) => { if (e.target.files[0]) handleProfilePicChange(e.target.files[0]); };
        document.getElementById('lightThemeBtn').onclick = () => document.body.className = '';
        document.getElementById('darkThemeBtn').onclick = () => document.body.className = 'dark';
        document.getElementById('neonThemeBtn').onclick = () => document.body.className = 'neon';
        document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('currentUserId'); location.reload(); };
        document.getElementById('cancelReplyBtn').onclick = () => { replyingTo = null; document.getElementById('replyBar').style.display = 'none'; };
        document.getElementById('scrollDownBtn').onclick = scrollToBottom;

        // Rain effect
        function initRain() {
            const canvasRain = document.getElementById('rainCanvas');
            const ctxRain = canvasRain.getContext('2d');
            canvasRain.width = window.innerWidth;
            canvasRain.height = window.innerHeight;
            let drops = [];
            for (let i=0;i<150;i++) drops.push({ x: Math.random()*canvasRain.width, y: Math.random()*canvasRain.height, len: Math.random()*20+10, speed: Math.random()*4+2 });
            function drawRain() {
                ctxRain.clearRect(0,0,canvasRain.width,canvasRain.height);
                ctxRain.strokeStyle = 'rgba(200,220,255,0.6)';
                ctxRain.lineWidth = 1.5;
                for (let d of drops) {
                    ctxRain.beginPath(); ctxRain.moveTo(d.x, d.y); ctxRain.lineTo(d.x, d.y+d.len); ctxRain.stroke();
                    d.y += d.speed;
                    if (d.y > canvasRain.height) { d.y = -d.len; d.x = Math.random()*canvasRain.width; }
                }
                requestAnimationFrame(drawRain);
            }
            drawRain();
            window.addEventListener('resize', () => { canvasRain.width = window.innerWidth; canvasRain.height = window.innerHeight; });
        }
        initRain();

        // Auto-login check
        (async () => {
            const savedId = localStorage.getItem('currentUserId');
            if (savedId) {
                await loadUsers();
                let user = users.find(u => u.id === savedId);
                if (user) {
                    currentUser = user;
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    initCanvas();
                    renderChat();
                    updateProfileUI();
                    renderIconShop();
                    setInterval(() => { renderChat(); updateProfileUI(); }, 2000);
                    return;
                }
            }
            document.getElementById('loginContainer').style.display = 'flex';
        })();

        // Make functions global for onclick
        window.purchaseIcon = purchaseIcon;
        window.equipIcon = equipIcon;
    </script>
</body>
