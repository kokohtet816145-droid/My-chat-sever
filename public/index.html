<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ArtVerse - Glitch Chat</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto; }
        body { background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        /* Login Page */
        .login-container { background: white; padding: 2rem; border-radius: 2rem; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .login-container input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 2rem; }
        .login-container button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 2rem; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .error { color: #ef4444; font-size: 0.8rem; margin-top: 8px; }
        /* Main App */
        .app { display: none; width: 100%; max-width: 600px; height: 100vh; background: white; flex-direction: column; }
        .chat-header { background: #3b82f6; color: white; padding: 16px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .profile-icon { background: white; color: #3b82f6; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .messages-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: #f1f5f9; padding: 8px 12px; border-radius: 1.2rem; max-width: 80%; align-self: flex-start; position: relative; }
        .message.own { background: #3b82f6; color: white; align-self: flex-end; }
        .msg-name { font-weight: bold; font-size: 0.75rem; margin-bottom: 4px; }
        .admin-badge { background: gold; color: black; font-size: 0.6rem; padding: 2px 6px; border-radius: 20px; margin-left: 5px; }
        .drawing-img { max-width: 150px; border-radius: 12px; margin-top: 5px; }
        .rating-panel { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
        .rating-select { width: 60px; padding: 4px; border-radius: 20px; }
        .rate-btn { background: #10b981; color: white; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
        .reactions { display: flex; gap: 6px; margin-top: 6px; }
        .react-btn { background: #e2e8f0; border: none; border-radius: 20px; padding: 2px 8px; cursor: pointer; }
        .input-area { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #ddd; background: white; }
        #messageInput { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 2rem; }
        button { background: #3b82f6; border: none; color: white; padding: 8px 16px; border-radius: 2rem; cursor: pointer; }
        .draw-btn { background: #10b981; }
        /* Drawing Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 16px; border-radius: 1rem; width: 95%; max-width: 500px; }
        canvas { width: 100%; aspect-ratio: 1/1; background: white; border: 1px solid #ccc; border-radius: 8px; cursor: crosshair; }
        .toolbar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .toolbar button { background: #6b7280; padding: 6px 12px; font-size: 0.8rem; }
        /* Side Panel */
        .side-panel { position: fixed; top: 0; right: 0; width: 280px; height: 100%; background: white; transform: translateX(100%); transition: 0.3s; z-index: 1001; padding: 16px; overflow-y: auto; box-shadow: -2px 0 8px rgba(0,0,0,0.2); }
        .side-panel.open { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .shop-item { display: flex; justify-content: space-between; margin: 12px 0; padding: 8px; background: #f1f5f9; border-radius: 2rem; align-items: center; }
        .icon-preview { display: inline-flex; align-items: center; gap: 8px; }
        .glitch-icon { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .icon-basic { background: linear-gradient(135deg, #a855f7, #ec4899); animation: glitch 0.8s infinite alternate; }
        .icon-premium { background: linear-gradient(135deg, #fbbf24, #dc2626); animation: glitch 0.6s infinite alternate; }
        .icon-legendary { background: radial-gradient(circle, #06b6d4, #d946ef); animation: glitch 0.4s infinite alternate; }
        .icon-mythic { background: #1e1b2e; color: #ff7b00; animation: glitch 0.3s infinite alternate; }
        @keyframes glitch { 0% { transform: skew(0deg); } 100% { transform: skew(2deg); } }
        .close-panel { float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
<div id="loginContainer" class="login-container">
    <h2>✨ ArtVerse Chat ✨</h2>
    <input type="text" id="loginName" placeholder="အသုံးပြုသူအမည်">
    <input type="password" id="loginPass" placeholder="စကားဝှက်">
    <input type="password" id="loginConfirm" placeholder="စကားဝှက် ထပ်ရိုက်ပါ">
    <button id="loginBtn">အကောင့်ဖွင့် / ဝင်ရန်</button>
    <div id="loginError" class="error"></div>
    <div style="font-size:0.7rem; margin-top:12px;">Admin: htetwaiphyo</div>
</div>

<div id="mainApp" class="app">
    <div class="chat-header">
        <span>ArtVerse Chat</span>
        <div class="profile-icon" id="profileBtn"><i class="fas fa-user"></i></div>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="စာရိုက်ပါ...">
        <button id="sendBtn">ပို့</button>
        <button id="drawBtn" class="draw-btn"><i class="fas fa-paintbrush"></i> ပုံဆွဲ</button>
    </div>
</div>

<div id="drawingModal" class="modal">
    <div class="modal-content">
        <canvas id="drawCanvas" width="500" height="500"></canvas>
        <div class="toolbar">
            <button id="pencilBtn">✏️ ခဲတံ</button>
            <button id="eraserBtn">🧽 ခဲဖျက်</button>
            <input type="color" id="colorPicker" value="#000000">
            <input type="range" id="brushSize" min="2" max="40" value="4">
            <button id="clearCanvas">🗑️ ရှင်း</button>
            <button id="confirmDraw">✅ ပုံပို့မယ်</button>
        </div>
        <button id="closeModal" style="margin-top:8px;">ပိတ်မယ်</button>
    </div>
</div>

<div id="sidePanel" class="side-panel">
    <button id="closePanel" class="close-panel">&times;</button>
    <h3>ကိုယ်ရေးအချက်</h3>
    <p><strong>နာမည်:</strong> <span id="profileName"></span></p>
    <p><strong>အမှတ်:</strong> <span id="profilePoints">0</span> ⚡</p>
    <p><strong>VIP:</strong> <span id="profileVip"></span></p>
    <p><strong>Admin:</strong> <span id="profileAdmin"></span></p>
    <hr>
    <h4>VIP ဆိုင်</h4>
    <div class="shop-item"><span>👑 VIP (3ပုံ/နေ့)</span><button id="buyVipBtn">150 ⚡</button></div>
    <div class="shop-item"><span>✨ VIP+ (5ပုံ/နေ့)</span><button id="buyVipPlusBtn">230 ⚡</button></div>
    <h4>Glitch Icons</h4>
    <div id="iconShop"></div>
    <button id="logoutBtn" style="background:#ef4444; margin-top:16px;">ထွက်မယ်</button>
</div>
<div id="overlay" class="overlay"></div>

<script>
    const socket = io();
    let currentUser = null;
    let users = [];
    let messages = [];
    let drawing = false, ctx, canvas, currentTool = 'pencil', currentColor = '#000000', brushWidth = 4, drawingHistory = [];

    const icons = {
        basic: { name: "အခြေခံ", price: 23, class: "icon-basic", icon: '<i class="fas fa-comment"></i>' },
        premium: { name: "ထူးစန်း", price: 33, class: "icon-premium", icon: '<i class="fas fa-star"></i>' },
        legendary: { name: "အလွန်လှ", price: 40, class: "icon-legendary", icon: '<i class="fas fa-gem"></i>' },
        mythic: { name: "မီးတောက်", price: 100, class: "icon-mythic", icon: '<i class="fas fa-fire"></i>' }
    };

    async function loadUsers() {
        const res = await fetch('/api/users');
        users = await res.json();
    }
    async function saveUser(user) {
        await fetch('/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(user) });
    }

    async function login() {
        const name = document.getElementById('loginName').value.trim();
        const pass = document.getElementById('loginPass').value;
        const confirm = document.getElementById('loginConfirm').value;
        if (!name || !pass) { document.getElementById('loginError').innerText = "အမည်နှင့် စကားဝှက် ဖြည့်ပါ"; return; }
        if (pass !== confirm) { document.getElementById('loginError').innerText = "စကားဝှက် မတူပါ"; return; }
        await loadUsers();
        let user = users.find(u => u.name === name);
        if (user) {
            if (user.password !== pass) { document.getElementById('loginError').innerText = "စကားဝှက် မှားသည်"; return; }
        } else {
            const isAdmin = (name === 'htetwaiphyo');
            user = {
                id: Date.now().toString(),
                name: name,
                points: 50,
                vipTier: "none",
                dailyDrawCount: 0,
                lastDrawDate: new Date().toISOString().slice(0,10),
                isAdmin: isAdmin,
                ownedIcons: ["basic"],
                equippedIcon: "basic",
                password: pass
            };
            users.push(user);
            await saveUser(user);
        }
        if (name === 'htetwaiphyo' && !user.isAdmin) { user.isAdmin = true; await saveUser(user); }
        if (name !== 'htetwaiphyo' && user.isAdmin) { user.isAdmin = false; await saveUser(user); }
        currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        initCanvas();
        updateProfileUI();
        renderIconShop();
    }

    function initCanvas() {
        canvas = document.getElementById('drawCanvas');
        ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 500;
        ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,500,500);
        saveState();
        function saveState() { drawingHistory.push(canvas.toDataURL()); if(drawingHistory.length>20) drawingHistory.shift(); }
        function restore() { if(drawingHistory.length>1) { drawingHistory.pop(); let img=new Image(); img.onload=()=>{ ctx.clearRect(0,0,500,500); ctx.drawImage(img,0,0); }; img.src=drawingHistory[drawingHistory.length-1]; } else { ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,500,500); saveState(); } }
        function getPos(e) {
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
            let cx, cy; if(e.touches) { cx=e.touches[0].clientX; cy=e.touches[0].clientY; } else { cx=e.clientX; cy=e.clientY; }
            return { x: (cx - rect.left)*scaleX, y: (cy - rect.top)*scaleY };
        }
        function start(e) { drawing=true; let p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x,p.y); ctx.stroke(); }
        function draw(e) { if(!drawing) return; let p=getPos(e); ctx.lineWidth=brushWidth; ctx.lineCap='round'; ctx.strokeStyle = currentTool==='pencil' ? currentColor : '#FFFFFF'; ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
        function end() { drawing=false; ctx.beginPath(); saveState(); }
        canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',draw); canvas.addEventListener('mouseup',end);
        canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',draw); canvas.addEventListener('touchend',end);
        document.getElementById('pencilBtn').onclick=()=>{ currentTool='pencil'; };
        document.getElementById('eraserBtn').onclick=()=>{ currentTool='eraser'; };
        document.getElementById('colorPicker').onchange=e=>currentColor=e.target.value;
        document.getElementById('brushSize').onchange=e=>brushWidth=parseInt(e.target.value);
        document.getElementById('clearCanvas').onclick=()=>{ ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,500,500); saveState(); };
        window.resetCanvas = () => { ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,500,500); saveState(); };
    }
    function submitDrawing() {
        let limit = currentUser.isAdmin ? 999 : (currentUser.vipTier === 'vip+' ? 5 : (currentUser.vipTier === 'vip' ? 3 : 2));
        if (currentUser.dailyDrawCount >= limit) { alert("ဒီနေ့ပုံဆွဲခွင့်ကုန်ပြီ"); return; }
        const imgData = canvas.toDataURL();
        socket.emit('drawing', { senderId: currentUser.id, imageData: imgData, timestamp: Date.now() });
        currentUser.dailyDrawCount++;
        saveUser(currentUser);
        updateProfileUI();
        document.getElementById('drawingModal').style.display = 'none';
    }

    socket.on('chat message', (msg) => {
        messages.push(msg);
        renderMessages();
    });
    socket.on('drawing', (draw) => {
        messages.push(draw);
        renderMessages();
    });
    socket.on('load messages', (msgs) => { messages = msgs; renderMessages(); });

    function sendMessage() {
        let input = document.getElementById('messageInput');
        let text = input.value.trim();
        if (!text) return;
        socket.emit('chat message', { senderId: currentUser.id, text: text, timestamp: Date.now() });
        input.value = '';
    }

    function renderMessages() {
        const container = document.getElementById('messagesArea');
        container.innerHTML = messages.map(msg => {
            const sender = users.find(u => u.id === msg.senderId) || { name: 'Unknown', isAdmin: false };
            const isOwn = (currentUser && msg.senderId === currentUser.id);
            let content = '';
            if (msg.text) content = msg.text;
            else if (msg.imageData) content = `<img src="${msg.imageData}" class="drawing-img">`;
            return `<div class="message ${isOwn ? 'own' : ''}">
                        <div class="msg-name">${escapeHtml(sender.name)} ${sender.isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div>
                        <div>${content}</div>
                    </div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    function updateProfileUI() {
        if (!currentUser) return;
        document.getElementById('profileName').innerText = currentUser.name;
        document.getElementById('profilePoints').innerText = currentUser.points;
        document.getElementById('profileVip').innerText = currentUser.vipTier === 'vip' ? 'VIP' : (currentUser.vipTier === 'vip+' ? 'VIP+' : 'Free');
        document.getElementById('profileAdmin').innerText = currentUser.isAdmin ? '✅ Admin' : '❌';
    }

    function renderIconShop() {
        const container = document.getElementById('iconShop');
        if (!container) return;
        let html = '';
        for (let [id, def] of Object.entries(icons)) {
            const owned = currentUser.ownedIcons.includes(id);
            const equipped = currentUser.equippedIcon === id;
            html += `<div class="shop-item">
                        <div class="icon-preview">
                            <div class="glitch-icon ${def.class}">${def.icon}</div>
                            <span>${def.name} (${def.price}⚡)</span>
                        </div>
                        <div>
                            ${!owned ? `<button class="buy-icon" data-id="${id}">ဝယ်</button>` : (equipped ? `<span>✅ သုံးနေသည်</span>` : `<button class="equip-icon" data-id="${id}">သုံးမယ်</button>`)}
                        </div>
                    </div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.buy-icon').forEach(btn => btn.onclick = () => purchaseIcon(btn.dataset.id));
        document.querySelectorAll('.equip-icon').forEach(btn => btn.onclick = () => equipIcon(btn.dataset.id));
    }

    async function purchaseIcon(iconId) {
        const def = icons[iconId];
        if (currentUser.points >= def.price && !currentUser.ownedIcons.includes(iconId)) {
            currentUser.points -= def.price;
            currentUser.ownedIcons.push(iconId);
            await saveUser(currentUser);
            updateProfileUI();
            renderIconShop();
            alert(`"${def.name}" ဝယ်ယူပြီးပါပြီ`);
        } else alert("မလုံလောက်ပါ");
    }
    async function equipIcon(iconId) {
        if (currentUser.ownedIcons.includes(iconId)) {
            currentUser.equippedIcon = iconId;
            await saveUser(currentUser);
            renderIconShop();
            alert("အိုင်ကွန်ပြောင်းပြီး");
        } else alert("ဦးစွာဝယ်ပါ");
    }
    async function buyVip() {
        if (currentUser.isAdmin) { currentUser.vipTier = 'vip'; await saveUser(currentUser); updateProfileUI(); alert("Admin: VIP အခမဲ့"); return; }
        if (currentUser.points >= 150 && currentUser.vipTier !== 'vip+') {
            currentUser.points -= 150;
            currentUser.vipTier = 'vip';
            await saveUser(currentUser);
            updateProfileUI();
            alert("VIP ဝယ်ပြီး");
        } else alert("မလုံလောက်");
    }
    async function buyVipPlus() {
        if (currentUser.isAdmin) { currentUser.vipTier = 'vip+'; await saveUser(currentUser); updateProfileUI(); alert("Admin: VIP+ အခမဲ့"); return; }
        if (currentUser.points >= 230) {
            currentUser.points -= 230;
            currentUser.vipTier = 'vip+';
            await saveUser(currentUser);
            updateProfileUI();
            alert("VIP+ ရပြီ");
        } else alert("မလုံလောက်");
    }
    function logout() {
        localStorage.removeItem('currentUser');
        location.reload();
    }
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; });
    }

    // Event listeners
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });
    document.getElementById('drawBtn').onclick = () => document.getElementById('drawingModal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('drawingModal').style.display = 'none';
    document.getElementById('confirmDraw').onclick = submitDrawing;
    document.getElementById('profileBtn').onclick = () => { document.getElementById('sidePanel').classList.add('open'); document.getElementById('overlay').style.display = 'block'; };
    document.getElementById('closePanel').onclick = () => { document.getElementById('sidePanel').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; };
    document.getElementById('overlay').onclick = () => { document.getElementById('sidePanel').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; };
    document.getElementById('buyVipBtn').onclick = buyVip;
    document.getElementById('buyVipPlusBtn').onclick = buyVipPlus;
    document.getElementById('logoutBtn').onclick = logout;

    // Auto login from localStorage
    const saved = localStorage.getItem('currentUser');
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            loadUsers().then(() => {
                const serverUser = users.find(u => u.id === currentUser.id);
                if (serverUser) currentUser = serverUser;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                initCanvas();
                updateProfileUI();
                renderIconShop();
            }).catch(() => {});
        } catch(e) { console.log(e); }
    }
</script>
</body>
</html>
